<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evelyn Learning Hub</title>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body {
            margin: 0; padding: 20px;
            background: #2980b9;
            color: #333; display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh;
        }
        .hub-container {
            background: #f5f6fa; width: 100%; max-width: 950px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 5px solid #fff; overflow: hidden;
        }
        .hub-header {
            background: #2c3e50; color: white; text-align: center;
            padding: 20px; border-bottom: 5px solid #e74c3c;
        }
        .hub-header h1 { margin: 0; font-size: 2.5rem; color: #fff; font-family: 'Georgia', serif; }
        .hub-header h2 { margin: 5px 0 0 0; font-size: 1.2rem; color: #f1c40f; }
        
        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;
            background: #ffffff;
        }
        .setting-box {
            background: #f8f9fa; padding: 12px 20px; border-radius: 10px;
            border: 1px solid #dcdde1; display: flex; align-items: center; justify-content: space-between;
        }
        .setting-box label { font-weight: bold; font-size: 1rem; color: #2c3e50; }
        .setting-box input[type="number"], .setting-box select {
            width: 130px; padding: 6px; border-radius: 5px; border: 1px solid #ccd1d9; text-align: center; font-size: 1rem;
        }
        .setting-box input[type="checkbox"] { transform: scale(1.4); }

        .file-actions { padding: 15px 20px; display: flex; gap: 15px; background: #eef2f7; }
        .btn-file {
            border: none; padding: 10px 25px; color: white; font-weight: bold; font-size: 1rem;
            border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
        .btn-save { background: #2980b9; }
        .btn-load { background: #9b59b6; }

        .words-table-container { padding: 20px; background: #fff; }
        .words-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .words-table th { background: #f1f2f6; color: #2c3e50; padding: 12px; text-align: center; border-bottom: 3px solid #ccd1d9; font-size: 1.1rem; }
        .words-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .words-table input[type="text"] { width: 90%; padding: 10px; border: 1px solid #ccd1d9; border-radius: 6px; text-align: center; font-size: 1rem; }
        
        .btn-delete {
            background: #e74c3c; color: white; border: none; width: 35px; height: 35px;
            border-radius: 50%; font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }
        .btn-add-word {
            background: #cbd5e1; color: #334155; border: none; padding: 12px 25px;
            font-weight: bold; font-size: 1rem; border-radius: 8px; cursor: pointer; margin-bottom: 20px;
        }

        .footer-action { padding: 20px; text-align: center; background: #f1f2f6; border-top: 2px solid #dcdde1; }
        .btn-start-game {
            background: #2ecc71; color: white; border: none; padding: 18px 60px;
            font-size: 1.6rem; font-weight: bold; border-radius: 40px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(46,204,113,0.4); width: 100%;
        }

        /* ACTIVE GAME PLAY OVERLAY */
        #game-play-screen {
            position: fixed; top:0; left:0; right:0; bottom:0; background: #2c3e50;
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
            padding: 20px;
        }
        .game-card {
            background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px;
            text-align: center; width: 100%; max-width: 650px; border: 2px solid rgba(255,255,255,0.2);
        }
        
        /* MULTIPLAYER / DOUBLE SCOREBOARD STYLING */
        .scoreboard-container {
            display: flex; justify-content: space-between; margin-bottom: 20px; gap: 20px;
        }
        .team-box {
            flex: 1; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold;
        }
        .team-a { background: #e74c3c; color: white; }
        .team-b { background: #3498db; color: white; }
        .team-score { font-size: 2.2rem; margin: 5px 0; font-weight: bold; }
        .score-btn {
            background: white; border: none; color: #333; font-weight: bold;
            padding: 5px 15px; border-radius: 5px; cursor: pointer; margin: 0 3px; font-size: 1rem;
        }

        /* SINGLE PLAYER SCORE BOX */
        .single-score-box {
            background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px;
            margin-bottom: 20px; font-size: 1.4rem; font-weight: bold;
        }

        .hint-display-area {
            min-height: 150px; display: flex; align-items: center; justify-content: center; margin: 15px 0;
        }
        .hint-image {
            max-width: 100%; max-height: 220px; border-radius: 10px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .hint-text { font-size: 2.8rem; margin: 0; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .game-letter-input {
            width: 80%; padding: 12px; font-size: 1.5rem; text-align: center;
            border-radius: 12px; border: none; margin: 15px 0; outline: none; color: #333;
        }
        .game-btn {
            background: #e67e22; color: white; border: none; padding: 12px 40px;
            font-size: 1.3rem; font-weight: bold; border-radius: 50px; cursor: pointer;
        }
        .btn-exit-game {
            position: absolute; top: 20px; right: 20px; background: #e74c3c; color: white;
            border: none; padding: 12px 25px; font-weight: bold; font-size: 1.1rem; border-radius: 8px; cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="creator-hub" class="hub-container">
        <div class="hub-header">
            <h1>Spelling Game</h1>
            <h2>Teacher Evelyn Learning Hub</h2>
        </div>

        <div class="settings-grid">
            <div class="setting-box">
                <label>Game Mode:</label>
                <select id="setup-game-mode">
                    <option value="single">Single Player</option>
                    <option value="double">Double Player (Teams)</option>
                </select>
            </div>
            <div class="setting-box">
                <label>Timer:</label>
                <input type="number" id="setup-timer" value="60">
            </div>
            <div class="setting-box">
                <label>Speed:</label>
                <select id="setup-speed">
                    <option>Normal</option>
                    <option>Fast</option>
                    <option>Slow</option>
                </select>
            </div>
            <div class="setting-box">
                <label>HP Hearts:</label>
                <input type="number" id="setup-hp" value="5">
            </div>
            <div class="setting-box">
                <label>Music:</label>
                <input type="checkbox" id="setup-music" checked>
            </div>
            <div class="setting-box">
                <label>SFX:</label>
                <input type="checkbox" id="setup-sfx" checked>
            </div>
            <div class="setting-box" style="grid-column: span 2; background:#ffebee;">
                <label style="color:#c62828; font-weight: bold;">Clear App:</label>
                <button onclick="clearAllRows()" style="background:#e74c3c; color:white; border:none; padding:6px 12px; font-weight:bold; cursor:pointer; border-radius:5px;">ERASE DATA</button>
            </div>
        </div>

        <div class="file-actions">
            <button class="btn-file btn-save" onclick="saveConfiguration()">💾 SAVE FILE</button>
            <button class="btn-file btn-load" onclick="triggerLoadFile()">📂 LOAD FILE</button>
            <input type="file" id="hidden-file-picker" style="display:none;" onchange="loadConfiguration(event)">
        </div>

        <div class="words-table-container">
            <table class="words-table">
                <thead>
                    <tr>
                        <th style="width: 45%;">Hint / Image URL</th>
                        <th style="width: 45%;">Answer</th>
                        <th style="width: 10%;">Del</th>
                    </tr>
                </thead>
                <tbody id="words-table-body">
                    <tr>
                        <td><input type="text" class="row-hint" value="Fruit"></td>
                        <td><input type="text" class="row-answer" value="Apple"></td>
                        <td><button class="btn-delete" onclick="deleteRow(this)">X</button></td>
                    </tr>
                </tbody>
            </table>

            <button class="btn-add-word" onclick="addNewBlankRow()">+ ADD WORD</button>
        </div>

        <div class="footer-action">
            <button class="btn-start-game" onclick="launchGameEngine()">SAVE & START</button>
        </div>
    </div>

    <div id="game-play-screen" class="hidden">
        <button class="btn-exit-game" onclick="closeGameEngine()">❌ EXIT HUB</button>
        <div class="game-card">
            
            <div id="single-player-hud" class="single-score-box hidden">
                Score: <span id="game-score-count">0</span>
            </div>

            <div id="double-player-hud" class="scoreboard-container hidden">
                <div class="team-box team-a">
                    <div>TEAM A</div>
                    <div id="score-a" class="team-score">0</div>
                    <button class="score-btn" onclick="adjustScore('a', 1)">+1</button>
                    <button class="score-btn" onclick="adjustScore('a', -1)">-1</button>
                </div>
                <div class="team-box team-b">
                    <div>TEAM B</div>
                    <div id="score-b" class="team-score">0</div>
                    <button class="score-btn" onclick="adjustScore('b', 1)">+1</button>
                    <button class="score-btn" onclick="adjustScore('b', -1)">-1</button>
                </div>
            </div>

            <div class="hint-display-area" id="game-hint-area">
                </div>
            
            <div id="game-underscore-slots" style="font-size: 3rem; letter-spacing: 8px; margin: 15px 0; font-weight: bold; color: #f1c40f;">_ _ _ _ _</div>
            
            <input type="text" id="game-player-input" class="game-letter-input" placeholder="Type answer here" autocomplete="off">
            <br>
            <button class="game-btn" onclick="verifyPlayerAnswer()">SUBMIT ANSWER</button>
            <div id="game-feedback" style="margin-top: 10px; font-weight: bold; height: 25px; font-size: 1.3rem;"></div>
        </div>
    </div>

    <script>
        const tableBody = document.getElementById('words-table-body');
        let scoreSingle = 0;
        let scoreA = 0;
        let scoreB = 0;
        let currentGameMode = 'single';

        function adjustScore(team, amount) {
            if (team === 'a') {
                scoreA = Math.max(0, scoreA + amount);
                document.getElementById('score-a').textContent = scoreA;
            } else {
                scoreB = Math.max(0, scoreB + amount);
                document.getElementById('score-b').textContent = scoreB;
            }
        }

        function addNewBlankRow(hintVal = "", answerVal = "") {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="row-hint" value="${hintVal}"></td>
                <td><input type="text" class="row-answer" value="${answerVal}"></td>
                <td><button class="btn-delete" onclick="deleteRow(this)">X</button></td>
            `;
            tableBody.appendChild(tr);
        }

        function deleteRow(buttonElement) { buttonElement.closest('tr').remove(); }

        function clearAllRows() {
            if(confirm("Are you sure you want to clear your words list?")) { tableBody.innerHTML = ""; }
        }

        function saveConfiguration() {
            const hints = document.querySelectorAll('.row-hint');
            const answers = document.querySelectorAll('.row-answer');
            let profileData = [];
            hints.forEach((hintInput, idx) => {
                profileData.push({ hint: hintInput.value, answer: answers[idx].value });
            });
            const blob = new Blob([JSON.stringify(profileData, null, 2)], { type: "application/json" });
            const tempAnchor = document.createElement('a');
            tempAnchor.href = URL.createObjectURL(blob);
            tempAnchor.download = "learning-hub-spelling-data.json";
            tempAnchor.click();
        }

        function triggerLoadFile() { document.getElementById('hidden-file-picker').click(); }

        function loadConfiguration(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    tableBody.innerHTML = ""; 
                    importedData.forEach(item => { addNewBlankRow(item.hint, item.answer); });
                } catch (err) { alert("Error reading file format."); }
            };
            reader.readAsText(file);
        }

        let operationalList = [];
        let runningIndex = 0;

        function launchGameEngine() {
            const hints = document.querySelectorAll('.row-hint');
            const answers = document.querySelectorAll('.row-answer');
            operationalList = [];

            hints.forEach((hintInput, idx) => {
                if(answers[idx].value.trim() !== "") {
                    operationalList.push({ hint: hintInput.value.trim(), answer: answers[idx].value.trim() });
                }
            });

            if(operationalList.length === 0) {
                alert("Please input at least one word item before starting!");
                return;
            }

            // Set up HUDs based on chosen Mode
            currentGameMode = document.getElementById('setup-game-mode').value;
            if(currentGameMode === 'single') {
                document.getElementById('single-player-hud').classList.remove('hidden');
                document.getElementById('double-player-hud').classList.add('hidden');
                scoreSingle = 0;
                document.getElementById('game-score-count').textContent = "0";
            } else {
                document.getElementById('double-player-hud').classList.remove('hidden');
                document.getElementById('single-player-hud').classList.add('hidden');
                scoreA = 0; scoreB = 0;
                document.getElementById('score-a').textContent = "0";
                document.getElementById('score-b').textContent = "0";
            }

            runningIndex = 0;
            document.getElementById('game-play-screen').classList.remove('hidden');
            loadGameWord();
        }

        function loadGameWord() {
            document.getElementById('game-player-input').value = "";
            document.getElementById('game-feedback').textContent = "";
            const hintArea = document.getElementById('game-hint-area');
            hintArea.innerHTML = "";
            
            if(runningIndex < operationalList.length) {
                const currentItem = operationalList[runningIndex];
                
                // Checks if it's a URL web address link
                if(currentItem.hint.startsWith("http://") || currentItem.hint.startsWith("https://")) {
                    hintArea.innerHTML = `<img src="${currentItem.hint}" class="hint-image" alt="Hint Image">`;
                } else {
                    hintArea.innerHTML = `<h2 class="hint-text">${currentItem.hint}</h2>`;
                }
                
                document.getElementById('game-underscore-slots').textContent = currentItem.answer.replace(/[a-zA-Z]/g, "_ ");
            } else {
                alert("Wonderful job! All words completed! 🎉");
                closeGameEngine();
            }
        }

        function verifyPlayerAnswer() {
            const inputElement = document.getElementById('game-player-input');
            const feedbackElement = document.getElementById('game-feedback');
            let playerAttempt = inputElement.value.trim().toLowerCase();
            let actualAnswer = operationalList[runningIndex].answer.toLowerCase();

            if(playerAttempt === actualAnswer) {
                if(currentGameMode === 'single') {
                    scoreSingle++;
                    document.getElementById('game-score-count').textContent = scoreSingle;
                }
                feedbackElement.style.color = "#2ecc71";
                feedbackElement.textContent = "Correct! ✨";
                runningIndex++;
                setTimeout(loadGameWord, 1500);
            } else {
                feedbackElement.style.color = "#ff4757";
                feedbackElement.textContent = "Try again! ❌";
            }
        }

        document.getElementById('game-player-input').addEventListener('keyup', function(e) {
            if(e.key === "Enter") verifyPlayerAnswer();
        });

        function closeGameEngine() { document.getElementById('game-play-screen').classList.add('hidden'); }
    </script>
</body>
</html>
