<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Match Center - Teacher Setup Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #2c3e50; }
        .hub-container { background-color: #34495e; border: 4px solid #ffffff; }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-center min-h-screen">

    <div class="hub-container w-full max-w-4xl rounded-3xl p-6 shadow-2xl text-white">
        <div class="text-center mb-6 bg-[#212f3d] p-4 rounded-2xl border-b-4 border-cyan-500">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide text-white">Word Match Game Center</h1>
            <p class="text-cyan-400 font-bold text-sm mt-1">Teacher Evelyn Match Hub (Word-to-Word Edition)</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white/5 p-4 rounded-xl border border-white/10 mb-4">
            <div class="md:col-span-2 flex flex-col sm:flex-row sm:items-center justify-between gap-2 bg-[#d4efdf]/10 p-3 rounded-lg border border-cyan-500/30">
                <label class="text-cyan-400 font-bold text-sm">Select Active Mode:</label>
                <select id="activeMode" class="bg-white text-gray-900 font-bold px-3 py-1.5 rounded-md text-sm">
                    <option value="single">Single Player</option>
                    <option value="double" selected>Double Player (Simultaneous Race)</option>
                </select>
            </div>

            <div class="flex items-center justify-between bg-white/5 p-3 rounded-lg border border-white/5">
                <label class="text-gray-300 text-sm font-semibold">Match Timer Per Round (seconds):</label>
                <input type="number" id="timerPerRound" value="45" class="w-24 bg-white text-gray-900 font-semibold px-3 py-1 rounded-md text-center text-sm">
            </div>

            <div class="flex items-center justify-between bg-white/5 p-3 rounded-lg border border-white/5">
                <label class="text-gray-300 text-sm font-semibold">HP Hearts:</label>
                <input type="number" id="hpHearts" value="5" class="w-24 bg-white text-gray-900 font-semibold px-3 py-1 rounded-md text-center text-sm">
            </div>
        </div>

        <div class="bg-[#1c2833] border-l-4 border-cyan-500 text-cyan-300 p-3 rounded-r-lg text-xs md:text-sm font-medium mb-4">
            📝 **How it works:** Students will drag the item from the scrambled column and drop it onto its matching target word box!
        </div>

        <div class="bg-white/5 rounded-xl border border-white/10 p-4 mb-6">
            <div class="grid grid-cols-12 gap-2 text-center text-xs font-bold uppercase text-gray-300 pb-2 border-b border-white/10 mb-3">
                <div class="col-span-5 text-left pl-2">Scrambled/Clue (e.g., irl)</div>
                <div class="col-span-5 text-left pl-2">Target Word (e.g., GIRL)</div>
                <div class="col-span-2">Del</div>
            </div>
            <div id="matchListContainer" class="space-y-3 max-h-64 overflow-y-auto pr-1"></div>
            <button onclick="addMatchRow()" class="mt-4 bg-slate-600 hover:bg-slate-500 text-white font-bold text-xs px-4 py-2 rounded uppercase">+ Add New Pair</button>
        </div>

        <button onclick="launchMatchSelection()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-extrabold text-xl py-4 rounded-2xl shadow-xl uppercase tracking-wider transition-all">
            LAUNCH WORD MATCH GAME
        </button>
    </div>

    <script>
        const defaultPairs = [
            { clue: "irl", target: "GIRL" },
            { clue: "oyb", target: "BOY" },
            { clue: "atc", target: "CAT" }
        ];

        function addMatchRow(clue = "", target = "") {
            const container = document.getElementById("matchListContainer");
            const rowId = 'match-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);
            container.insertAdjacentHTML('beforeend', `
                <div id="${rowId}" class="grid grid-cols-12 gap-2 items-center text-gray-900">
                    <div class="col-span-5"><input type="text" value="${clue}" class="match-clue w-full bg-white px-3 py-2 rounded text-sm font-semibold"></div>
                    <div class="col-span-5"><input type="text" value="${target}" class="match-target w-full bg-white px-3 py-2 rounded text-sm font-semibold uppercase"></div>
                    <div class="col-span-2 flex justify-center">
                        <button onclick="document.getElementById('${rowId}').remove()" class="bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center font-black">X</button>
                    </div>
                </div>
            `);
        }

        function captureMatchState() {
            const items = [];
            for (let row of document.getElementById("matchListContainer").children) {
                const clue = row.querySelector(".match-clue")?.value.trim();
                const target = row.querySelector(".match-target")?.value.trim().toUpperCase();
                if (clue && target) items.push({ clue, target });
            }
            return {
                activeMode: document.getElementById("activeMode").value,
                timerPerRound: parseInt(document.getElementById("timerPerRound").value) || 45,
                hpHearts: parseInt(document.getElementById("hpHearts").value) || 5,
                matchList: items.length ? items : defaultPairs
            };
        }

        function applyMatchConfig(config) {
            document.getElementById("activeMode").value = config.activeMode || "double";
            document.getElementById("timerPerRound").value = config.timerPerRound || 45;
            document.getElementById("hpHearts").value = config.hpHearts || 5;
            document.getElementById("matchListContainer").innerHTML = "";
            (config.matchList || defaultPairs).forEach(m => addMatchRow(m.clue, m.target));
        }

        function launchMatchSelection() {
            localStorage.setItem("word_match_config", JSON.stringify(captureMatchState()));
            window.location.href = "match-game.html";
        }

        window.onload = function() {
            const local = localStorage.getItem("word_match_config");
            local ? applyMatchConfig(JSON.parse(local)) : applyMatchConfig({ matchList: defaultPairs });
        };
    </script>
</body>
</html>
