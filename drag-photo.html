<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evelyn Learning Hub - Drag & Drop Race</title>
    <style>
        :root {
            --primary-bg: #f4f6f9;
            --panel-bg: #ffffff;
            --team1-color: #0056b3;
            --team2-color: #c82333;
            --accent-green: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .hidden {
            display: none !important;
        }

        /* --- CONFIG PANEL STYLES --- */
        .hub-header {
            background-color: #2c3e50;
            color: #f1c40f;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 22px;
            border-radius: 8px 8px 0 0;
            margin-bottom: 20px;
        }

        .config-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.row-layout {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }

        select, input[type="number"], input[type="text"] {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-blue { background-color: #2980b9; color: white; }
        .btn-purple { background-color: #8e44ad; color: white; }
        .btn-gray { background-color: #bdc3c7; color: #2c3e50; }
        .btn-danger { background-color: #e74c3c; color: white; padding: 5px 10px; border-radius: 50%; }

        .banner-info {
            background-color: #fef9e7;
            border-left: 5px solid #f1c40f;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
        }

        .word-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        .word-table th, .word-table td {
            border: 1px solid #dee2e6;
            padding: 12px;
            text-align: left;
        }

        .word-table th { background-color: #f8f9fa; }

        .btn-launch {
            width: 100%;
            background-color: var(--accent-green);
            color: white;
            font-size: 20px;
            padding: 15px;
            border-radius: 30px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        /* --- GAMEPLAY ARENA STYLES --- */
        .arena-container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            height: 85vh;
        }

        .lane {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 4px solid transparent;
        }

        #lane-team1 { border-color: var(--team1-color); }
        #lane-team2 { border-color: var(--team2-color); }

        .lane-header {
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 25px;
        }

        #lane-team1 .lane-header { background-color: var(--team1-color); }
        #lane-team2 .lane-header { background-color: var(--team2-color); }

        .stat-badge {
            background: rgba(25px, 25px, 25px, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 18px;
        }

        .track-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }

        .card-source-box {
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .draggable-card {
            background: #fff;
            padding: 15px;
            border: 3px solid #3498db;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            cursor: grab;
            text-align: center;
            font-weight: bold;
            font-size: 22px;
            max-width: 200px;
            user-select: none;
        }

        .draggable-card img {
            max-width: 150px;
            max-height: 100px;
            display: block;
            margin: 0 auto 10px;
            border-radius: 6px;
            pointer-events: none;
        }

        .draggable-card:active { cursor: grabbing; }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            flex-wrap: wrap;
            padding-bottom: 20px;
        }

        .drop-target {
            background: #f1f4f6;
            border: 3px dashed #bdc3c7;
            border-radius: 10px;
            min-width: 110px;
            padding: 20px 10px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #7f8c8d;
            transition: all 0.2s;
        }

        .drop-target.drag-over {
            background: #e8f4fd;
            border-color: #3498db;
            transform: scale(1.05);
        }

        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 900;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .feedback-correct { background: rgba(40, 167, 69, 0.85); }
        .feedback-wrong { background: rgba(200, 35, 51, 0.85); }
        .show-feedback { opacity: 1; }
    </style>
</head>
<body>

    <div id="config-panel" class="config-container">
        <div class="hub-header">Teacher Evelyn Learning Hub</div>
        
        <div class="form-grid">
            <div class="form-group">
                <label>Select Active Mode:</label>
                <select id="game-mode" onchange="toggleModeLayout()">
                    <option value="single">Single Player (Solo Focus)</option>
                    <option value="versus" selected>Two Player (Versus Mode)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Timer Per Word (Seconds):</label>
                <input type="number" id="param-timer" value="60">
            </div>
            <div class="form-group">
                <label>HP Hearts:</label>
                <input type="number" id="param-hp" value="5">
            </div>
            <div class="form-group row-layout" style="margin-top: 25px;">
                <label><input type="checkbox" id="param-sfx" checked> SFX Audio Engine Active</label>
                <label><input type="checkbox" id="param-music" checked> Music Track Playback</label>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-blue" onclick="exportConfigData()">💾 SAVE FILE</button>
            <button class="btn-purple" onclick="triggerConfigUpload()">📁 LOAD FILE</button>
            <input type="file" id="hidden-file-input" class="hidden" accept=".json" onchange="importConfigData(event)">
        </div>

        <div class="banner-info">
            🚀 Engine Active: +10 Points per Correct Answer. Incorrect inputs show the answer and skip forward immediately!
        </div>

        <table class="word-table" id="items-table">
            <thead>
                <tr>
                    <th>Hint / Image URL</th>
                    <th>Answer Target</th>
                    <th style="width: 50px;">Del</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" class="input-hint" value="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=150" placeholder="Text or Image URL"></td>
                    <td><input type="text" class="input-answer" value="Zebra" placeholder="Target Match"></td>
                    <td><button class="btn-danger" onclick="deleteTableRow(this)">X</button></td>
                </tr>
                <tr>
                    <td><input type="text" class="input-hint" value="Fruit" placeholder="Text or Image URL"></td>
                    <td><input type="text" class="input-answer" value="Apple" placeholder="Target Match"></td>
                    <td><button class="btn-danger" onclick="deleteTableRow(this)">X</button></td>
                </tr>
            </tbody>
        </table>

        <button class="btn-gray" style="margin-bottom: 30px;" onclick="addNewTableRow()">+ ADD WORD</button>
        <button class="btn-launch" onclick="launchGameEngine()">SAVE & LAUNCH SELECTION</button>
    </div>

    <div id="game-arena" class="arena-container hidden">
        
        <div id="lane-team1" class="lane">
            <div class="lane-header">
                <span>GROUP A</span>
                <span id="t1-timer" class="stat-badge">⏱️ 0:00</span>
                <span id="t1-score" class="stat-badge">Score: 0</span>
            </div>
            <div class="track-zone" id="zone-t1">
                <div class="feedback-overlay" id="feedback-t1"></div>
                <div class="card-source-box" id="source-t1"></div>
                <div class="options-container" id="options-t1"></div>
            </div>
        </div>

        <div id="lane-team2" class="lane">
            <div class="lane-header">
                <span>GROUP B</span>
                <span id="t2-timer" class="stat-badge">⏱️ 0:00</span>
                <span id="t2-score" class="stat-badge">Score: 0</span>
            </div>
            <div class="track-zone" id="zone-t2">
                <div class="feedback-overlay" id="feedback-t2"></div>
                <div class="card-source-box" id="source-t2"></div>
                <div class="options-container" id="options-t2"></div>
            </div>
        </div>

    </div>

    <script>
        let gameConfig = { mode: 'versus', timer: 60, hp: 5, list: [] };
        let gameState = {
            t1: { index: 0, score: 0, timeLeft: 0, timerId: null },
            t2: { index: 0, score: 0, timeLeft: 0, timerId: null }
        };

        // UI Management - Setup Dashboard Operations
        function addNewTableRow() {
            const tbody = document.getElementById('items-table').querySelector('tbody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="input-hint" placeholder="Text or Image URL"></td>
                <td><input type="text" class="input-answer" placeholder="Target Match"></td>
                <td><button class="btn-danger" onclick="deleteTableRow(this)">X</button></td>
            `;
            tbody.appendChild(row);
        }

        function deleteTableRow(button) {
            button.closest('tr').remove();
        }

        function toggleModeLayout() {
            const mode = document.getElementById('game-mode').value;
            document.getElementById('lane-team2').style.display = (mode === 'single') ? 'none' : 'flex';
        }

        // Configuration Importers & Exporters
        function collectDataset() {
            const list = [];
            const rows = document.querySelectorAll('#items-table tbody tr');
            rows.forEach(row => {
                const hint = row.querySelector('.input-hint').value.trim();
                const answer = row.querySelector('.input-answer').value.trim();
                if(hint && answer) list.push({ hint, answer });
            });
            return list;
        }

        function exportConfigData() {
            const data = {
                mode: document.getElementById('game-mode').value,
                timer: parseInt(document.getElementById('param-timer').value),
                hp: parseInt(document.getElementById('param-hp').value),
                list: collectDataset()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'hub-profile.json';
            a.click();
        }

        function triggerConfigUpload() { document.getElementById('hidden-file-input').click(); }

        function importConfigData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                document.getElementById('game-mode').value = data.mode || 'versus';
                document.getElementById('param-timer').value = data.timer || 60;
                document.getElementById('param-hp').value = data.hp || 5;
                
                const tbody = document.getElementById('items-table').querySelector('tbody');
                tbody.innerHTML = '';
                data.list.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><input type="text" class="input-hint" value="${item.hint}"></td>
                        <td><input type="text" class="input-answer" value="${item.answer}"></td>
                        <td><button class="btn-danger" onclick="deleteTableRow(this)">X</button></td>
                    `;
                    tbody.appendChild(row);
                });
                toggleModeLayout();
            };
            reader.readAsText(file);
        }

        // Interactive Runtime Engine Initialization
        function launchGameEngine() {
            gameConfig.list = collectDataset();
            if(gameConfig.list.length === 0) return alert("Please map out at least one Answer Target tuple sequence.");
            
            gameConfig.mode = document.getElementById('game-mode').value;
            gameConfig.timer = parseInt(document.getElementById('param-timer').value);
            gameConfig.hp = parseInt(document.getElementById('param-hp').value);

            document.getElementById('config-panel').classList.add('hidden');
            document.getElementById('game-arena').classList.remove('hidden');

            setupLane('t1');
            if(gameConfig.mode === 'versus') {
                setupLane('t2');
            } else {
                document.getElementById('lane-team2').classList.add('hidden');
            }
        }

        function setupLane(teamId) {
            gameState[teamId].index = 0;
            gameState[teamId].score = 0;
            gameState[teamId].timeLeft = gameConfig.timer;
            
            document.getElementById(`${teamId}-score`).innerText = `Score: 0`;
            renderActiveQuestionCard(teamId);
            runLaneClock(teamId);
        }

        function runLaneClock(teamId) {
            const timerDisplay = document.getElementById(`${teamId}-timer`);
            gameState[teamId].timerId = setInterval(() => {
                gameState[teamId].timeLeft--;
                let mins = Math.floor(gameState[teamId].timeLeft / 60);
                let secs = gameState[teamId].timeLeft % 60;
                timerDisplay.innerText = `⏱️ ${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if(gameState[teamId].timeLeft <= 0) {
                    stopLaneClock(teamId);
                    evaluateMatchEnd();
                }
            }, 1000);
        }

        function stopLaneClock(teamId) {
            if(gameState[teamId].timerId) clearInterval(gameState[teamId].timerId);
        }

        // Render Cards and Track Drop Slots
        function renderActiveQuestionCard(teamId) {
            const sourceContainer = document.getElementById(`source-${teamId}`);
            const optionsContainer = document.getElementById(`options-${teamId}`);
            sourceContainer.innerHTML = '';
            optionsContainer.innerHTML = '';

            if(gameState[teamId].index >= gameConfig.list.length) {
                stopLaneClock(teamId);
                sourceContainer.innerHTML = "<span style='font-weight:bold;color:#27ae60;'>FINISHED!</span>";
                evaluateMatchEnd();
                return;
            }

            const currentData = gameConfig.list[gameState[teamId].index];

            // Render Card Template
            const card = document.createElement('div');
            card.id = `card-${teamId}-${gameState[teamId].index}`;
            card.className = 'draggable-card';
            card.draggable = true;
            card.dataset.answer = currentData.answer;
            card.dataset.team = teamId;

            if(currentData.hint.startsWith('http://') || currentData.hint.startsWith('https://')) {
                const img = document.createElement('img');
                img.src = currentData.hint;
                card.appendChild(img);
            } else {
                const textNode = document.createTextNode(currentData.hint);
                card.appendChild(textNode);
            }
            
            // Drag Native Bindings
            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({ team: teamId, answer: currentData.answer }));
            });

            sourceContainer.appendChild(card);

            // Generate Answer Bins (Shuffled to prevent simple memorization matching)
            let rawOptions = gameConfig.list.map(item => item.answer);
            let uniqueOptions = [...new Set(rawOptions)].sort(() => Math.random() - 0.5);

            uniqueOptions.forEach(opt => {
                const targetSlot = document.createElement('div');
                targetSlot.className = 'drop-target';
                targetSlot.innerText = opt;
                targetSlot.dataset.value = opt;

                targetSlot.addEventListener('dragover', (e) => e.preventDefault());
                targetSlot.addEventListener('dragenter', () => targetSlot.classList.add('drag-over'));
                targetSlot.addEventListener('dragleave', () => targetSlot.classList.remove('drag-over'));
                
                targetSlot.addEventListener('drop', (e) => {
                    targetSlot.classList.remove('drag-over');
                    const payload = JSON.parse(e.dataTransfer.getData('text/plain'));
                    if(payload.team === teamId) {
                        processTurnResult(teamId, payload.answer, opt);
                    }
                });

                optionsContainer.appendChild(targetSlot);
            });
        }

        // Processing Scoring System Logic Rules
        function processTurnResult(teamId, expected, actual) {
            const overlay = document.getElementById(`feedback-${teamId}`);
            
            if(expected.toLowerCase() === actual.toLowerCase()) {
                gameState[teamId].score += 1; // 1 point for every correct answer
                document.getElementById(`${teamId}-score`).innerText = `Score: ${gameState[teamId].score}`;
                overlay.innerText = "+1";
                overlay.className = "feedback-overlay feedback-correct show-feedback";
            } else {
                overlay.innerText = "❌";
                overlay.className = "feedback-overlay feedback-wrong show-feedback";
            }

            setTimeout(() => {
                overlay.className = "feedback-overlay";
                gameState[teamId].index++;
                renderActiveQuestionCard(teamId);
            }, 800);
        }

        function evaluateMatchEnd() {
            const t1Done = gameState.t1.index >= gameConfig.list.length || gameState.t1.timeLeft <= 0;
            const t2Done = gameConfig.mode === 'single' || (gameState.t2.index >= gameConfig.list.length || gameState.t2.timeLeft <= 0);

            if(t1Done && t2Done) {
                let report = `Game Over!\nGROUP A Score: ${gameState.t1.score}`;
                if(gameConfig.mode === 'versus') {
                    report += `\nGROUP B Score: ${gameState.t2.score}\n\n`;
                    if(gameState.t1.score > gameState.t2.score) report += "🏆 GROUP A Wins!";
                    else if(gameState.t2.score > gameState.t1.score) report += "🏆 GROUP B Wins!";
                    else report += "🤝 It's a Tie Match!";
                }
                alert(report);
            }
        }
    </script>
</body>
</html>
