<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evelyn Learning Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background-color: #e64a19;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }
        .form-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .alert-banner {
            background-color: #fffde7;
            border: 1px solid #fff59d;
            color: #f57f17;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        th, td {
            text-align: left;
            padding: 8px;
            font-size: 14px;
        }
        th {
            border-bottom: 2px solid #ddd;
        }
        .del-btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-buttons {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .btn-add { background-color: #b0bec5; color: #37474f; }
        .btn-save { background-color: #2196F3; color: white; }
        .btn-load { background-color: #FF9800; color: white; }
        
        .btn-launch {
            width: 100%;
            background-color: #2ec4b6;
            color: white;
            font-size: 18px;
            padding: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Teacher Evelyn Learning Hub</div>
    
    <div class="form-body">
        <div class="form-group">
            <label>Select Active Mode:</label>
            <select id="gameMode">
                <option>Single Player (Solo Focus)</option>
                <option>Two Players (Versus Race)</option>
            </select>
        </div>
        
        <div class="row-grid form-group">
            <div>
                <label>Timer Per Player (seconds):</label>
                <input type="number" id="gameTimer" value="60">
            </div>
            <div>
                <label>HP Hearts:</label>
                <input type="number" id="gameHearts" value="5">
            </div>
        </div>
        
        <div class="alert-banner">
            🚀 Engine Active: +1 Point per Correct Answer. Incorrect inputs show answer and skip forward immediately!
        </div>
        
        <table>
            <thead>
                <tr>
                    <th style="width: 45%;">Hint / Text Question</th>
                    <th style="width: 45%;">Answer Target (Drop Zone Options)</th>
                    <th style="width: 10%; text-align: center;">Del</th>
                </tr>
            </thead>
            <tbody id="wordTableBody">
                <tr>
                    <td><input type="text" class="hint-input" placeholder="ox" value="ox"></td>
                    <td><input type="text" class="target-input" placeholder="Oo" value="Oo"></td>
                    <td style="display: flex; justify-content: center;"><button class="del-btn" onclick="deleteRow(this)">X</button></td>
                </tr>
                <tr>
                    <td><input type="text" class="hint-input" placeholder="puppy" value="puppy"></td>
                    <td><input type="text" class="target-input" placeholder="Pp" value="Pp"></td>
                    <td style="display: flex; justify-content: center;"><button class="del-btn" onclick="deleteRow(this)">X</button></td>
                </tr>
                <tr>
                    <td><input type="text" class="hint-input" placeholder="nest" value="nest"></td>
                    <td><input type="text" class="target-input" placeholder="Nn" value="Nn"></td>
                    <td style="display: flex; justify-content: center;"><button class="del-btn" onclick="deleteRow(this)">X</button></td>
                </tr>
            </tbody>
        </table>
        
        <div class="action-buttons">
            <button type="button" class="btn btn-add" id="addRowBtn">+ ADD WORD</button>
            <button type="button" class="btn btn-save" id="saveFileBtn">⬇️ SAVE TO FILE</button>
            <button type="button" class="btn btn-load" id="loadFileBtn">📂 LOAD FILE</button>
            <input type="file" id="hiddenFileInput" accept=".json" style="display: none;">
        </div>
        
        <button type="button" class="btn-launch" id="launchBtn">Save & Launch Selection</button>
    </div>
</div>

<script>
    const tableBody = document.getElementById('wordTableBody');

    // 1. Function to add a new word row
    document.getElementById('addRowBtn').addEventListener('click', () => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><input type="text" class="hint-input" placeholder="hint"></td>
            <td><input type="text" class="target-input" placeholder="target"></td>
            <td style="display: flex; justify-content: center;"><button class="del-btn" onclick="deleteRow(this)">X</button></td>
        `;
        tableBody.appendChild(row);
    });

    // 2. Function to delete a row
    function deleteRow(button) {
        const rows = tableBody.getElementsByTagName('tr');
        if (rows.length > 1) {
            button.closest('tr').remove();
        } else {
            alert("You must keep at least one word row!");
        }
    }

    // 3. FEATURE: Download settings as a JSON file
    document.getElementById('saveFileBtn').addEventListener('click', () => {
        const wordRows = [];
        const hints = document.querySelectorAll('.hint-input');
        const targets = document.querySelectorAll('.target-input');
        
        hints.forEach((hintEl, index) => {
            if(hintEl.value.trim() !== "" || targets[index].value.trim() !== "") {
                wordRows.push({
                    hint: hintEl.value,
                    target: targets[index].value
                });
            }
        });

        const gameData = {
            mode: document.getElementById('gameMode').value,
            timer: document.getElementById('gameTimer').value,
            hearts: document.getElementById('gameHearts').value,
            wordList: wordRows
        };

        const fileName = prompt("Give this list a name (e.g. Week-1-Phonics):", "spelling-game-list");
        if (!fileName) return; // cancel if user clicks cancel

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(gameData, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", fileName + ".json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    });

    // 4. FEATURE: Upload / Load standard JSON file back into layout
    document.getElementById('loadFileBtn').addEventListener('click', () => {
        document.getElementById('hiddenFileInput').click();
    });

    document.getElementById('hiddenFileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const importedData = JSON.parse(event.target.result);
                
                // Set main configuration inputs
                document.getElementById('gameMode').value = importedData.mode || "Single Player (Solo Focus)";
                document.getElementById('gameTimer').value = importedData.timer || "60";
                document.getElementById('gameHearts').value = importedData.hearts || "5";
                
                // Clear out existing rows to load fresh ones
                tableBody.innerHTML = "";
                
                // Populate the word fields dynamically
                if (importedData.wordList && importedData.wordList.length > 0) {
                    importedData.wordList.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><input type="text" class="hint-input" value="${item.hint}"></td>
                            <td><input type="text" class="target-input" value="${item.target}"></td>
                            <td style="display: flex; justify-content: center;"><button class="del-btn" onclick="deleteRow(this)">X</button></td>
                        `;
                        tableBody.appendChild(row);
                    });
                }
                alert("🎉 Game File Loaded Successfully!");
            } catch (err) {
                alert("Error processing file. Please ensure it's a valid saved file.");
            }
        };
        reader.readAsText(file);
        e.target.value = ''; // resets input so same file can be uploaded back-to-back if needed
    });

    // 5. Launch Game Engine Logic
    document.getElementById('launchBtn').addEventListener('click', () => {
        alert("Selection saved! Ready to direct setup data into game view.");
        // Your existing game engine launch logic stays here...
    });
</script>

</body>
</html>
