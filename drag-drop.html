<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evelyn Learning Hub - Drag & Drop Race</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .hidden { display: none !important; }

        /* Dashboard Setup Styles */
        .hub-header {
            background-color: #d94126;
            color: #ffd700;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 24px;
            border-radius: 6px 6px 0 0;
        }
        .setup-card {
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 0 0 6px 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .row { display: flex; gap: 20px; margin-bottom: 15px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #333; }
        select, input[type="number"], input[type="text"] {
            padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;
        }
        .engine-banner {
            background-color: #fffde7;
            border: 1px solid #ffe082;
            padding: 12px;
            color: #b78103;
            font-weight: bold;
            border-radius: 4px;
            margin: 15px 0;
        }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f7f9fa; }
        .btn-del { background: #e53935; color: white; border: none; padding: 6px 10px; border-radius: 50%; cursor: pointer; }
        .btn-secondary { background: #b0bec5; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-launch {
            display: block; width: 100%; background: #2ecc71; color: white; border: none; 
            padding: 15px; font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px;
        }

        /* Split Screen Racing Arena Styles */
        .arena-container { display: flex; height: 90vh; gap: 15px; padding: 10px; box-sizing: border-box; }
        .player-screen { flex: 1; display: flex; flex-direction: column; border-radius: 12px; background: #fff; border: 5px solid; padding: 20px; box-sizing: border-box; }
        .split-left { border-color: #0056b3; }
        .split-right { border-color: #a0522d; }
        .player-header { text-align: center; font-size: 28px; font-weight: bold; padding: 8px; color: white; border-radius: 6px; letter-spacing: 2px; }
        .p1-color { background: #0056b3; }
        .p2-color { background: #a0522d; }
        .stats-bar { display: flex; justify-content: space-between; margin: 20px 0; font-size: 20px; font-weight: bold; color: #333; }

        /* Race Lanes & Drag-Drop Layout */
        .track-lane { flex: 1; background: #fafafa; border: 2px dashed #ccc; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 8px; }
        .drag-card {
            background: #29b6f6; color: white; font-size: 28px; font-weight: bold; padding: 25px 40px; 
            border-radius: 8px; cursor: grab; min-width: 140px; text-align: center; border-bottom: 5px solid #0288d1;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .drag-card:active { cursor: grabbing; }
        .drop-zone-container { display: flex; gap: 15px; justify-content: space-around; }
        .drop-box {
            flex: 1; background: #fdd835; border: 3px dashed #fbc02d; padding: 30px 10px; 
            text-align: center; font-size: 26px; font-weight: bold; border-radius: 8px; color: #333; transition: transform 0.1s;
        }
    </style>
</head>
<body>

    <div id="dashboard" class="container">
        <div class="hub-header">Teacher Evelyn Learning Hub</div>
        
        <div class="setup-card">
            <div class="row">
                <div class="col">
                    <label>Select Active Mode:</label>
                    <select id="gameMode">
                        <option value="single">Single Player (Solo Focus)</option>
                        <option value="versus">Two Player (Versus Race)</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col">
                    <label>Timer Per Player (seconds):</label>
                    <input type="number" id="wordTimer" value="60">
                </div>
                <div class="col">
                    <label>HP Hearts:</label>
                    <input type="number" id="hpHearts" value="5">
                </div>
            </div>

            <hr>
            <div class="engine-banner">🚀 Engine Active: +1 Point per Correct Answer. Incorrect inputs show answer and skip forward immediately!</div>

            <table id="wordTable">
                <thead>
                    <tr>
                        <th>Hint / Text Question</th>
                        <th>Answer Target (Drop Zone Options)</th>
                        <th style="width: 50px;">Del</th>
                    </tr>
                </thead>
                <tbody id="wordTableBody">
                    <tr>
                        <td><input type="text" class="hint-input" value="ox" style="width:90%;"></td>
                        <td><input type="text" class="target-input" value="Oo" style="width:90%;"></td>
                        <td><button class="btn-del" onclick="deleteRow(this)">X</button></td>
                    </tr>
                    <tr>
                        <td><input type="text" class="hint-input" value="puppy" style="width:90%;"></td>
                        <td><input type="text" class="target-input" value="Pp" style="width:90%;"></td>
                        <td><button class="btn-del" onclick="deleteRow(this)">X</button></td>
                    </tr>
                    <tr>
                        <td><input type="text" class="hint-input" value="nest" style="width:90%;"></td>
                        <td><input type="text" class="target-input" value="Nn" style="width:90%;"></td>
                    </tr>
                </tbody>
            </table>
            
            <button class="btn-secondary" onclick="addWordRow()">+ ADD WORD</button>
            <button class="btn-launch" onclick="launchGame()">SAVE & LAUNCH SELECTION</button>
        </div>
    </div>

    <div id="gameArena" class="arena-container hidden">
        <div id="p1Area" class="player-screen split-left">
            <div class="player-header p1-color">TEAM 1</div>
            <div class="stats-bar">
                <span>Score: <b id="p1Score">0</b></span>
                <span>Timer: <b id="p1Timer">60</b>s</span>
                <span>HP: <b id="p1HP">5</b> ❤️</span>
            </div>
            <div class="track-lane">
                <div class="drag-zone" id="p1DragZone"></div>
            </div>
            <div class="drop-zone-container" id="p1DropZones"></div>
        </div>

        <div id="p2Area" class="player-screen split-right">
            <div class="player-header p2-color">TEAM 2</div>
            <div class="stats-bar">
                <span>Score: <b id="p2Score">0</b></span>
                <span>Timer: <b id="p2Timer">60</b>s</span>
                <span>HP: <b id="p2HP">5</b> ❤️</span>
            </div>
            <div class="track-lane">
                <div class="drag-zone" id="p2DragZone"></div>
            </div>
            <div class="drop-zone-container" id="p2DropZones"></div>
        </div>
    </div>

    <script>
        let gameData = [];
        let gameSettings = { mode: 'single', timer: 60, hp: 5 };
        let p1State = { score: 0, hp: 5, index: 0, timer: 60, interval: null };
        let p2State = { score: 0, hp: 5, index: 0, timer: 60, interval: null };

        function addWordRow() {
            const tbody = document.getElementById('wordTableBody');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="hint-input" placeholder="e.g., apple" style="width:90%;"></td>
                <td><input type="text" class="target-input" placeholder="e.g., Aa" style="width:90%;"></td>
                <td><button class="btn-del" onclick="deleteRow(this)">X</button></td>
            `;
            tbody.appendChild(tr);
        }

        function deleteRow(button) {
            const row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
        }

        function launchGame() {
            gameSettings.mode = document.getElementById('gameMode').value;
            gameSettings.timer = parseInt(document.getElementById('wordTimer').value);
            gameSettings.hp = parseInt(document.getElementById('hpHearts').value);

            gameData = [];
            const hints = document.querySelectorAll('.hint-input');
            const targets = document.querySelectorAll('.target-input');
            
            hints.forEach((hintEl, index) => {
                if(hintEl.value.trim() !== "") {
                    gameData.push({
                        hint: hintEl.value.trim(),
                        target: targets[index].value.trim()
                    });
                }
            });

            if(gameData.length === 0) {
                alert("Please build and fill out at least one item row!");
                return;
            }

            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('gameArena').classList.remove('hidden');

            if (gameSettings.mode === 'single') {
                document.getElementById('p2Area').classList.add('hidden');
            } else {
                document.getElementById('p2Area').classList.remove('hidden');
            }

            setupPlayer('p1', p1State);
            if(gameSettings.mode === 'versus') {
                setupPlayer('p2', p2State);
            }
        }

        function setupPlayer(playerPrefix, state) {
            state.score = 0;
            state.hp = gameSettings.hp;
            state.index = 0;
            state.timer = gameSettings.timer;

            document.getElementById(`${playerPrefix}Score`).innerText = state.score;
            document.getElementById(`${playerPrefix}HP`).innerText = state.hp;
            document.getElementById(`${playerPrefix}Timer`).innerText = state.timer;

            renderRound(playerPrefix, state);

            clearInterval(state.interval);
            state.interval = setInterval(() => {
                state.timer--;
                document.getElementById(`${playerPrefix}Timer`).innerText = state.timer;
                if(state.timer <= 0) {
                    endPlayerGame(playerPrefix, state, "Time's Up!");
                }
            }, 1000);
        }

        function renderRound(playerPrefix, state) {
            if(state.index >= gameData.length) {
                endPlayerGame(playerPrefix, state, "🏁 Completed Race!");
                return;
            }

            const currentItem = gameData[state.index];

            // Render current Question Element
            const dragZone = document.getElementById(`${playerPrefix}DragZone`);
            dragZone.innerHTML = `<div class="drag-card" draggable="true" id="${playerPrefix}_drag">${currentItem.hint}</div>`;

            const dragCard = document.getElementById(`${playerPrefix}_drag`);
            dragCard.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', playerPrefix);
            });

            // Populate Answer Choice Lanes (Synced common options, shuffled layouts)
            const dropZoneContainer = document.getElementById(`${playerPrefix}DropZones`);
            dropZoneContainer.innerHTML = '';

            const sharedOptions = gameData.map(item => item.target);
            const shuffledOptions = [...new Set(sharedOptions)].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(targetText => {
                const dropBox = document.createElement('div');
                dropBox.className = 'drop-box';
                dropBox.innerText = targetText;

                dropBox.addEventListener('dragover', (e) => e.preventDefault());
                dropBox.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const actionPlayer = e.dataTransfer.getData('text/plain');
                    if(actionPlayer === playerPrefix) {
                        evaluateAnswer(playerPrefix, state, targetText, currentItem.target);
                    }
                });

                dropZoneContainer.appendChild(dropBox);
            });
        }

        function evaluateAnswer(playerPrefix, state, selectedValue, correctValue) {
            if(selectedValue === correctValue) {
                state.score += 1; // Award exactly 1 point per correct selection
                document.getElementById(`${playerPrefix}Score`).innerText = state.score;
            } else {
                state.hp--;
                document.getElementById(`${playerPrefix}HP`).innerText = state.hp;
                alert(`${playerPrefix.toUpperCase()} Wrong! Correct answer was: ${correctValue}`);
            }

            if(state.hp <= 0) {
                endPlayerGame(playerPrefix, state, "❌ Game Over (No Lives!)");
            } else {
                state.index++;
                renderRound(playerPrefix, state);
            }
        }

        function endPlayerGame(playerPrefix, state, statusMsg) {
            clearInterval(state.interval);
            const dragZone = document.getElementById(`${playerPrefix}DragZone`);
            dragZone.innerHTML = `<div style="font-size:24px; font-weight:bold; color:#e53935; text-align:center;">${statusMsg}<br>Final Score: ${state.score}</div>`;
            document.getElementById(`${playerPrefix}DropZones`).innerHTML = '';
        }
    </script>
</body>
</html>
