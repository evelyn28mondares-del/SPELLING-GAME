<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Match - Interactive Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #1a252f; overflow-x: hidden; font-family: system-ui, sans-serif; }
        .match-slot { min-height: 70px; border: 3px dashed #3498db; transition: all 0.2s ease; }
        .word-item { cursor: grab; transform: scale(1); transition: transform 0.15s, background-color 0.2s; }
        .word-item:active { cursor: grabbing; transform: scale(1.02); }
        .kbd-focus { outline: 4px solid #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .frozen { opacity: 0.4; pointer-events: none; filter: grayscale(1); position: relative; }
        .frozen::after { content: "❌ LOCKED!"; position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; color: #ff4757; font-weight: 900; font-size: 1.5rem; border-radius: 0.75rem; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col p-4 select-none">

    <!-- Global Progress & Standalone Timer Bar -->
    <div class="w-full max-w-6xl mx-auto bg-[#2c3e50] rounded-2xl p-4 mb-4 border border-white/10 shadow-xl flex flex-col md:flex-row items-center justify-between gap-4">
        <button onclick="window.location.href='match-hub.html'" class="bg-gray-600 hover:bg-gray-700 text-xs font-bold px-3 py-1.5 rounded uppercase transition-all">⚙️ Match Setup</button>
        <div class="flex-1 w-full max-w-md bg-black/40 h-6 rounded-full overflow-hidden relative border border-white/5">
            <div id="globalProgressBar" class="h-full bg-gradient-to-r from-cyan-400 to-blue-500 w-full transition-all duration-1000"></div>
            <div id="globalTimerText" class="absolute inset-0 flex items-center justify-center text-xs font-black drop-shadow">MATCH TIMER: --s</div>
        </div>
        <div class="text-cyan-400 font-extrabold tracking-widest uppercase text-sm">WORD MATCH ARENA</div>
    </div>

    <!-- Main Game Window Container -->
    <div id="arenaGrid" class="w-full max-w-6xl mx-auto flex-1 grid grid-cols-1 gap-6">
        <!-- Player Viewports generated dynamically here -->
    </div>

    <script>
        let config = null;
        let roundTimer = 0;
        let timerInterval = null;
        
        let p1State = { score: 0, lives: 5, pairs: [], focusIdx: 0, selectedClue: null, frozen: false };
        let p2State = { score: 0, lives: 5, pairs: [], focusIdx: 0, selectedClue: null, frozen: false };

        function loadEngine() {
            const raw = localStorage.getItem("word_match_config");
            if(!raw) { window.location.href="match-hub.html"; return; }
            config = JSON.parse(raw);
            
            p1State.lives = config.hpHearts;
            p2State.lives = config.hpHearts;

            buildArenaViewports();
            startMatchSession();
        }

        function buildArenaViewports() {
            const grid = document.getElementById("arenaGrid");
            grid.innerHTML = "";

            if(config.activeMode === "single") {
                grid.className = "w-full max-w-4xl mx-auto flex-1 grid grid-cols-1";
                grid.appendChild(createPlayerDOM("p1", "STUDENT ARENA"));
            } else {
                grid.className = "w-full max-w-6xl mx-auto flex-1 grid grid-cols-1 md:grid-cols-2 gap-6";
                grid.appendChild(createPlayerDOM("p1", "PLAYER 1 (WASD to select clue, Space to match target)"));
                grid.appendChild(createPlayerDOM("p2", "PLAYER 2 (Arrows to select clue, Enter to match target)"));
            }
        }

        function createPlayerDOM(pid, label) {
            const container = document.createElement("div");
            container.id = `${pid}Container`;
            container.className = "bg-[#2c3e50]/40 border-2 border-white/10 rounded-3xl p-6 flex flex-col shadow-lg justify-between";
            container.innerHTML = `
                <div>
                    <div class="flex justify-between items-center border-b border-white/5 pb-3 mb-4">
                        <span class="font-black text-sm text-cyan-400">${label}</span>
                        <div id="${pid}Hearts" class="text-red-500 text-xl"></div>
                    </div>
                    <div class="text-2xl font-black mb-6">SCORE: <span id="${pid}Score" class="text-emerald-400">0</span></div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="text-xs font-bold uppercase text-center text-gray-400 mb-2">Drag These Clues</div>
                            <div id="${pid}Clues" class="space-y-2"></div>
                        </div>
                        <div>
                            <div class="text-xs font-bold uppercase text-center text-gray-400 mb-2">Drop Targets Here</div>
                            <div id="${pid}Targets" class="space-y-2"></div>
                        </div>
                    </div>
                </div>
            `;
            return container;
        }

        function startMatchSession() {
            roundTimer = config.timerPerRound;
            setupPlayerBoard("p1", p1State);
            if(config.activeMode === "double") {
                setupPlayerBoard("p2", p2State);
            }
            renderTimerBar();
            startCountdown();
        }

        function setupPlayerBoard(pid, state) {
            state.frozen = false;
            state.selectedClue = null;
            state.focusIdx = 0;

            document.getElementById(`${pid}Score`).innerText = state.score;
            document.getElementById(`${pid}Hearts`).innerHTML = "❤️".repeat(Math.max(0, state.lives)) || "💀 OUT";

            // Save pairs data locally
            state.pairs = JSON.parse(JSON.stringify(config.matchList));

            // Scramble clues row and targets row separately
            let scrambledClues = [...state.pairs].sort(() => Math.random() - 0.5);
            let scrambledTargets = [...state.pairs].sort(() => Math.random() - 0.5);

            const cluesContainer = document.getElementById(`${pid}Clues`);
            cluesContainer.innerHTML = "";
            scrambledClues.forEach((pair, idx) => {
                const el = document.createElement("div");
                el.className = "word-item p-3 bg-gradient-to-r from-amber-400 to-orange-500 rounded-xl font-black text-gray-900 text-center shadow-md border-2 border-transparent";
                el.innerText = pair.clue;
                el.draggable = true;
                el.id = `${pid}-clue-${idx}`;
                el.dataset.target = pair.target;

                el.addEventListener("dragstart", (e) => {
                    e.dataTransfer.setData("text/plain", JSON.stringify({ pid, clueId: el.id, target: pair.target }));
                });
                cluesContainer.appendChild(el);
            });

            const targetsContainer = document.getElementById(`${pid}Targets`);
            targetsContainer.innerHTML = "";
            scrambledTargets.forEach((pair, idx) => {
                const row = document.createElement("div");
                row.className = "match-slot p-3 bg-black/30 rounded-xl flex items-center justify-center font-black text-lg border-2 border-dashed border-white/20 text-gray-400 transition-all";
                row.innerText = pair.target;
                row.dataset.target = pair.target;

                row.addEventListener("dragover", (e) => e.preventDefault());
                row.addEventListener("drop", (e) => {
                    e.preventDefault();
                    const data = JSON.parse(e.dataTransfer.getData("text/plain"));
                    if(data.pid === pid) handleMatchAttempt(pid, state, data.clueId, row);
                });

                targetsContainer.appendChild(row);
            });

            if(state.lives > 0) highlightKbdElement(pid, 0);
        }

        function handleMatchAttempt(pid, state, clueId, targetSlot) {
            if(state.frozen || state.lives <= 0) return;
            const clueEl = document.getElementById(clueId);
            if(!clueEl) return;

            if(clueEl.dataset.target === targetSlot.dataset.target) {
                // Correct match setup
                state.score += 10;
                document.getElementById(`${pid}Score`).innerText = state.score;
                
                targetSlot.className = "p-3 bg-emerald-500 text-white rounded-xl flex flex-col items-center justify-center font-black text-md border-2 border-solid border-emerald-300 shadow-inner";
                targetSlot.innerHTML = `<span class="text-xs text-emerald-200">MATCHED</span><div>${clueEl.innerText} ➔ ${targetSlot.dataset.target}</div>`;
                
                clueEl.remove();

                // Check win condition for round
                const remainingClues = document.querySelectorAll(`#${pid}Clues .word-item`);
                if(remainingClues.length === 0) {
                    state.score += 20; // Bonus for completion
                    alert(`🎉 ${pid.toUpperCase()} matched all words successfully!`);
                    checkSessionEndGame();
                } else {
                    state.focusIdx = 0;
                    highlightKbdElement(pid, 0);
                }
            } else {
                // Incorrect match penalty rules
                state.lives--;
                document.getElementById(`${pid}Hearts`).innerHTML = "❤️".repeat(Math.max(0, state.lives)) || "💀 OUT";
                
                const container = document.getElementById(`${pid}Container`);
                container.classList.add("animate-shake");
                setTimeout(() => container.classList.remove("animate-shake"), 400);

                if(state.lives <= 0) {
                    container.classList.add("frozen");
                    checkSessionEndGame();
                }
            }
        }

        function startCountdown() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                roundTimer--;
                renderTimerBar();
                if(roundTimer <= 0) {
                    clearInterval(timerInterval);
                    alert("⏱️ TIME'S UP FOR THIS ROUND!");
                    endGameSession();
                }
            }, 1000);
        }

        function renderTimerBar() {
            const pct = (roundTimer / config.timerPerRound) * 100;
            document.getElementById("globalProgressBar").style.width = `${pct}%`;
            document.getElementById("globalTimerText").innerText = `MATCH TIMER: ${roundTimer}s`;
        }

        function checkSessionEndGame() {
            if(config.activeMode === "single" && p1State.lives <= 0) { endGameSession(); }
            if(config.activeMode === "double" && (p1State.lives <= 0 || document.querySelectorAll(`#p1Clues .word-item`).length === 0) && (p2State.lives <= 0 || document.querySelectorAll(`#p2Clues .word-item`).length === 0)) {
                endGameSession();
            }
        }

        function endGameSession() {
            clearInterval(timerInterval);
            let msg = "🏁 GAME OVER!\n\n";
            if(config.activeMode === "single") { msg += `Final Match Score: ${p1State.score}`; }
            else { msg += `Player 1 Match Score: ${p1State.score}\nPlayer 2 Match Score: ${p2State.score}`; }
            alert(msg);
            window.location.href = "match-hub.html";
        }

        function highlightKbdElement(pid, idx) {
            document.querySelectorAll(`#${pid}Clues .word-item`).forEach(el => el.classList.remove("kbd-focus"));
            const targetBlock = document.querySelectorAll(`#${pid}Clues .word-item`)[idx];
            if(targetBlock) targetBlock.classList.add("kbd-focus");
        }

        window.addEventListener("keydown", (e) => {
            const k = e.key.toLowerCase();

            // Player 1 Control Layer (W/S to move cursor, A/D to cycle targets, Space to match)
            if(!p1State.frozen && p1State.lives > 0) {
                const items = document.querySelectorAll("#p1Clues .word-item");
                const targets = document.querySelectorAll("#p1Targets .match-slot");
                if(items.length > 0) {
                    if(k === "w") {
                        p1State.focusIdx = (p1State.focusIdx > 0) ? p1State.focusIdx - 1 : items.length - 1;
                        highlightKbdElement("p1", p1State.focusIdx);
                    } else if(k === "s") {
                        p1State.focusIdx = (p1State.focusIdx < items.length - 1) ? p1State.focusIdx + 1 : 0;
                        highlightKbdElement("p1", p1State.focusIdx);
                    } else if(k === "space" || e.key === " ") {
                        e.preventDefault();
                        const activeClue = items[p1State.focusIdx];
                        if(activeClue) {
                            // Automatically search for corresponding structural text element target
                            const matchingSlot = Array.from(targets).find(t => t.dataset.target === activeClue.dataset.target);
                            if(matchingSlot) handleMatchAttempt("p1", p1State, activeClue.id, matchingSlot);
                        }
                    }
                }
            }

            // Player 2 Control Layer (Arrows to navigate, Enter to match)
            if(config && config.activeMode === "double" && !p2State.frozen && p2State.lives > 0) {
                const items = document.querySelectorAll("#p2Clues .word-item");
                const targets = document.querySelectorAll("#p2Targets .match-slot");
                if(items.length > 0) {
                    if(e.key === "ArrowUp") {
                        p2State.focusIdx = (p2State.focusIdx > 0) ? p2State.focusIdx - 1 : items.length - 1;
                        highlightKbdElement("p2", p2State.focusIdx);
                    } else if(e.key === "ArrowDown") {
                        p2State.focusIdx = (p2State.focusIdx < items.length - 1) ? p2State.focusIdx + 1 : 0;
                        highlightKbdElement("p2", p2State.focusIdx);
                    } else if(e.key === "Enter") {
                        e.preventDefault();
                        const activeClue = items[p2State.focusIdx];
                        if(activeClue) {
                            const matchingSlot = Array.from(targets).find(t => t.dataset.target === activeClue.dataset.target);
                            if(matchingSlot) handleMatchAttempt("p2", p2State, activeClue.id, matchingSlot);
                        }
                    }
                }
            }
        });

        window.onload = loadEngine;
    </script>
</body>
</html>
