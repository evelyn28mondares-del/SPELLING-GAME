<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop - Teacher Setup Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #2c3e50; }
        .hub-container { background-color: #34495e; border: 4px solid #ffffff; }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-center min-h-screen">

    <div class="hub-container w-full max-w-4xl rounded-3xl p-6 shadow-2xl text-white">
        <div class="text-center mb-6 bg-[#212f3d] p-4 rounded-2xl border-b-4 border-yellow-500">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide text-white">Drag & Drop Spelling Hub</h1>
            <p class="text-yellow-400 font-bold text-sm mt-1">Teacher Evelyn Learning Hub</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white/5 p-4 rounded-xl border border-white/10 mb-4">
            <div class="md:col-span-2 flex flex-col sm:flex-row sm:items-center justify-between gap-2 bg-[#d4efdf]/10 p-3 rounded-lg border border-green-500/30">
                <label class="text-green-400 font-bold text-sm">Select Active Mode:</label>
                <select id="activeMode" class="bg-white text-gray-900 font-bold px-3 py-1.5 rounded-md text-sm">
                    <option value="single">Single Player</option>
                    <option value="double" selected>Double Player (Simultaneous Race)</option>
                </select>
            </div>

            <div class="flex items-center justify-between bg-white/5 p-3 rounded-lg border border-white/5">
                <label class="text-gray-300 text-sm font-semibold">Timer Per Word (seconds):</label>
                <input type="number" id="timerPerWord" value="60" class="w-24 bg-white text-gray-900 font-semibold px-3 py-1 rounded-md text-center text-sm">
            </div>

            <div class="flex items-center justify-between bg-white/5 p-3 rounded-lg border border-white/5">
                <label class="text-gray-300 text-sm font-semibold">HP Hearts:</label>
                <input type="number" id="hpHearts" value="5" class="w-24 bg-white text-gray-900 font-semibold px-3 py-1 rounded-md text-center text-sm">
            </div>

            <div class="md:col-span-2 flex items-center justify-between bg-red-500/10 p-3 rounded-lg border border-red-500/30">
                <span class="text-red-400 font-bold text-sm">Clear Workspace Profile:</span>
                <button onclick="eraseData()" class="bg-red-600 hover:bg-red-700 text-white font-extrabold text-xs px-4 py-1.5 rounded uppercase tracking-wider transition-all">Erase Data</button>
            </div>
        </div>

        <div class="flex gap-3 bg-[#1c2833] p-4 rounded-xl mb-4 border border-white/5">
            <button onclick="saveToFile()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-2 rounded-lg">🇺🇸 Save File</button>
            <label class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-bold px-4 py-2 rounded-lg cursor-pointer">
                📁 Load File <input type="file" id="fileInput" accept=".json" class="hidden" onchange="loadFromFile(event)">
            </label>
        </div>

        <div class="bg-amber-100 border-l-4 border-amber-500 text-amber-900 p-3 rounded-r-lg text-xs md:text-sm font-bold mb-4">
            🚀 Engine Parameters: Drag letters manually OR use active keyboard configurations to interact with selection rows!
        </div>

        <div class="bg-white/5 rounded-xl border border-white/10 p-4 mb-6">
            <div class="grid grid-cols-12 gap-2 text-center text-xs font-bold uppercase text-gray-300 pb-2 border-b border-white/10 mb-3">
                <div class="col-span-5 text-left pl-2">Hint / Image URL</div>
                <div class="col-span-5 text-left pl-2">Answer Target</div>
                <div class="col-span-2">Del</div>
            </div>
            <div id="wordListContainer" class="space-y-3 max-h-64 overflow-y-auto pr-1"></div>
            <button onclick="addWordRow()" class="mt-4 bg-slate-600 hover:bg-slate-500 text-white font-bold text-xs px-4 py-2 rounded uppercase">+ Add Word</button>
        </div>

        <button onclick="launchSelection()" class="w-full bg-[#e67e22] hover:bg-[#d35400] text-white font-extrabold text-xl py-4 rounded-2xl shadow-xl uppercase tracking-wider transition-all">
            LAUNCH DRAG & DROP GAME
        </button>
    </div>

    <script>
        const defaultWords = [{ hint: "Fruit", answer: "APPLE" }, { hint: "Animal", answer: "ZEBRA" }];

        function addWordRow(hint = "", answer = "") {
            const container = document.getElementById("wordListContainer");
            const rowId = 'row-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);
            container.insertAdjacentHTML('beforeend', `
                <div id="${rowId}" class="grid grid-cols-12 gap-2 items-center text-gray-900">
                    <div class="col-span-5"><input type="text" value="${hint}" class="word-hint w-full bg-white px-3 py-2 rounded text-sm font-semibold"></div>
                    <div class="col-span-5"><input type="text" value="${answer}" class="word-answer w-full bg-white px-3 py-2 rounded text-sm font-semibold uppercase"></div>
                    <div class="col-span-2 flex justify-center">
                        <button onclick="document.getElementById('${rowId}').remove()" class="bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center font-black">X</button>
                    </div>
                </div>
            `);
        }

        function captureState() {
            const items = [];
            for (let row of document.getElementById("wordListContainer").children) {
                const hint = row.querySelector(".word-hint")?.value.trim();
                const answer = row.querySelector(".word-answer")?.value.trim().toUpperCase();
                if (hint && answer) items.push({ hint, answer });
            }
            return {
                activeMode: document.getElementById("activeMode").value,
                timerPerWord: parseInt(document.getElementById("timerPerWord").value) || 60,
                hpHearts: parseInt(document.getElementById("hpHearts").value) || 5,
                wordList: items.length ? items : defaultWords
            };
        }

        function applyConfig(config) {
            document.getElementById("activeMode").value = config.activeMode || "double";
            document.getElementById("timerPerWord").value = config.timerPerWord || 60;
            document.getElementById("hpHearts").value = config.hpHearts || 5;
            document.getElementById("wordListContainer").innerHTML = "";
            (config.wordList || defaultWords).forEach(w => addWordRow(w.hint, w.answer));
        }

        function launchSelection() {
            localStorage.setItem("spelling_hub_config", JSON.stringify(captureState()));
            window.location.href = "game.html"; // Connects seamlessly with game.html
        }

        function saveToFile() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(captureState(), null, 2));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "drag_game_profile.json"); dl.click();
        }

        function loadFromFile(e) {
            const file = e.target.files[0]; if (!file) return;
            const r = new FileReader(); r.onload = function(evt) { applyConfig(JSON.parse(evt.target.result)); }; r.readAsText(file);
        }

        function eraseData() {
            localStorage.removeItem("spelling_hub_config");
            applyConfig({ activeMode: "double", timerPerWord: 60, hpHearts: 5, wordList: defaultWords });
        }

        window.onload = function() {
            const local = localStorage.getItem("spelling_hub_config");
            local ? applyConfig(JSON.parse(local)) : applyConfig({ wordList: defaultWords });
        };
    </script>
</body>
</html>
